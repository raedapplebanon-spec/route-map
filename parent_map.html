<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Parent Tracking Map</title>
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    .bus-marker-container { pointer-events: none; }

    /* 🟢 2. FIX: Larger Group Marker for Touch Screens (40px instead of 30px) */
    .group-marker {
      background-color: #1a73e8; /* Google Blue */
      color: white;
      border-radius: 50%;
      width: 40px; 
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      border: 3px solid white;
      box-shadow: 0 3px 6px rgba(0,0,0,0.4);
      cursor: pointer;
    }

    .student-list-popup { padding: 8px; text-align: right; min-width: 120px; }
    .student-list-popup h4 { margin: 0 0 8px 0; font-size: 15px; color: #1a73e8; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .student-list-popup ul { margin: 0; padding-right: 20px; list-style-type: disc; }
    .student-list-popup li { font-size: 14px; margin-bottom: 4px; color: #333; font-weight: 600;}

    /* Modern Button Styling */
    .custom-map-control {
      background-color: #fff;
      border: 0;
      border-radius: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
      cursor: pointer;
      margin: 15px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: bold;
      color: #1a73e8;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background-color 0.2s;
    }
    .custom-map-control:hover { background-color: #f8f9fa; }
  </style>
</head>
<body>

  <div id="map"></div>

  <script>
    let map;
    let busMarker;
    let studentMarkers = []; 
    let infoWindow; 
    let isMapInit = false;
    let AdvancedMarkerElement, PinElement;
    
    let animationFrameId = null; 
    let isUserPanned = false;

    // 🟢 5. FIX: Clean Map Style (Hides Businesses, Parks, etc. to focus on roads)
    const cleanMapStyle = [
      { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
      { featureType: "transit", elementType: "labels", stylers: [{ visibility: "off" }] }
    ];

    // --- 1. INITIALIZATION ---
    async function initMap() {
      try {
        const { Map } = await google.maps.importLibrary("maps");
        const markerLib = await google.maps.importLibrary("marker");
        await google.maps.importLibrary("geometry"); 

        AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
        PinElement = markerLib.PinElement;

        map = new Map(document.getElementById("map"), {
          center: { lat: 33.8938, lng: 35.5018 },
          zoom: 15,
          mapId: "48c2bb983bd19c1c44d95cb7",
          disableDefaultUI: true, // Keep it clean
          zoomControl: true, // Allow zoom
          styles: cleanMapStyle // Apply the clean style
        });

        infoWindow = new google.maps.InfoWindow();

        // RECENTER BUTTON
        const recenterBtn = document.createElement("button");
        recenterBtn.innerHTML = "🎯 إعادة التوجيه";
        recenterBtn.classList.add("custom-map-control");
        recenterBtn.addEventListener("click", () => {
          isUserPanned = false;
          recenterView(true); 
        });

        // Add button to top right to avoid Bottom Sheet collisions
        map.controls[google.maps.ControlPosition.TOP_RIGHT].push(recenterBtn);

        // Detect dragging
        map.addListener("dragstart", () => { isUserPanned = true; });

        isMapInit = true;
        console.log("✅ Parent Map Ready");

        const readyPayload = { action: "mapIsReady" };
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(readyPayload);
        } else if (window.parent) {
            window.parent.postMessage(readyPayload, "*");
        }

      } catch (e) {
        console.error("❌ Init Error: ", e);
      }
    }

    // --- 2. CLUSTERING LOGIC ---
    function groupStudents(students) {
      const groups = [];
      const threshold = 20; // 20 meters

      students.forEach(student => {
        let added = false;
        const studentPos = new google.maps.LatLng(parseFloat(student.lat), parseFloat(student.lng));

        for (let group of groups) {
          const groupPos = new google.maps.LatLng(group.lat, group.lng);
          const distance = google.maps.geometry.spherical.computeDistanceBetween(studentPos, groupPos);
          
          if (distance <= threshold) {
            group.members.push(student);
            added = true;
            break;
          }
        }

        if (!added) {
          groups.push({
            lat: parseFloat(student.lat),
            lng: parseFloat(student.lng),
            members: [student]
          });
        }
      });
      return groups;
    }

    // --- 3. RENDERING MARKERS ---
    function renderStudentMarkers(groups) {
      studentMarkers.forEach(m => m.map = null);
      studentMarkers = [];

      groups.forEach(group => {
        const position = { lat: group.lat, lng: group.lng };
        let markerContent;
        let marker;

        if (group.members.length > 1) {
          // GROUP MARKER
          const div = document.createElement("div");
          div.className = "group-marker";
          div.textContent = group.members.length;
          markerContent = div;

          marker = new AdvancedMarkerElement({
            map: map,
            position: position,
            content: markerContent,
            title: "مجموعة طلاب"
          });

          marker.addListener("click", () => {
            let listHtml = `<div class="student-list-popup"><h4>الطلاب (${group.members.length})</h4><ul>`;
            group.members.forEach(m => {
              // Ensure name exists, fallback to 'طالب'
              listHtml += `<li>${m.name || m.displayName || 'طالب'}</li>`;
            });
            listHtml += `</ul></div>`;
            
            infoWindow.setContent(listHtml);
            infoWindow.open(map, marker);
          });

        } else {
          // 🟢 2. FIX: Scaled Student Pin (scale: 1.2 makes it larger)
          const pin = new PinElement({ 
            background: "#00c853", 
            glyphColor: "white",
            scale: 1.2
          });
          markerContent = pin.element;
          
          marker = new AdvancedMarkerElement({
            map: map,
            position: position,
            content: markerContent,
            title: group.members[0].name || group.members[0].displayName
          });
        }
        
        studentMarkers.push(marker);
      });
    }

    // --- 4. ANIMATION & UPDATES ---
    function animateMarker(marker, targetLat, targetLng) {
      const startPos = marker.position;
      const startLat = (typeof startPos.lat === 'function') ? startPos.lat() : startPos.lat;
      const startLng = (typeof startPos.lng === 'function') ? startPos.lng() : startPos.lng;
      
      const startTime = performance.now();
      // 🟢 5. FIX: Animation matches DB Throttler (3 seconds = 2800ms to allow reset)
      const duration = 2800; 

      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      
      function step(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Easing function for smoother sliding
        const easeProgress = progress * (2 - progress); 

        const currentLat = startLat + (targetLat - startLat) * easeProgress;
        const currentLng = startLng + (targetLng - startLng) * easeProgress;
        
        marker.position = { lat: currentLat, lng: currentLng };
        
        if (progress < 1) {
          animationFrameId = requestAnimationFrame(step);
        } else {
          animationFrameId = null;
        }
      }
      animationFrameId = requestAnimationFrame(step);
    }

    function recenterView(forceFit = false) {
      if (!isMapInit || !map) return;
      const bounds = new google.maps.LatLngBounds();
      let hasPoints = false;

      if (busMarker && busMarker.position) {
        bounds.extend(busMarker.position);
        hasPoints = true;
      }

      studentMarkers.forEach(m => {
        if (m.position) {
          bounds.extend(m.position);
          hasPoints = true;
        }
      });

      if (hasPoints && forceFit) {
        // 🟢 4. FIX: Bottom Padding 150px to prevent the BottomSheet from hiding markers
        map.fitBounds(bounds, { top: 80, bottom: 150, left: 50, right: 50 });
        
        // 🟢 3. FIX: Smart Zoom - Prevent extreme zooming if bounds are too small
        const listener = google.maps.event.addListener(map, "idle", function() {
          if (map.getZoom() > 17) {
            map.setZoom(17);
          }
          google.maps.event.removeListener(listener);
        });

      } else if (busMarker && !isUserPanned) {
        map.panTo(busMarker.position);
      }
    }

    window.handleDirectUpdate = function(lat, lng) {
      updateBusUI({ lat: lat, lng: lng });
    };

    function updateBusUI(data) {
      if (!isMapInit) return;
      const lat = parseFloat(data.lat);
      const lng = parseFloat(data.lng);
      if (isNaN(lat) || isNaN(lng)) return;
      const busPos = { lat, lng };

      if (!busMarker) {
        // 🟢 2. FIX: Bus Icon scaled to 1.6 to make it very clear
        const busPin = new PinElement({ background: "#FBBC04", glyphText: "🚌", scale: 1.6 });
        const container = document.createElement('div');
        container.className = 'bus-marker-container';
        container.appendChild(busPin.element);
        
        busMarker = new AdvancedMarkerElement({
          map: map,
          position: busPos,
          content: container,
          zIndex: 1000 // Ensure bus is always on top
        });
      } else {
        animateMarker(busMarker, lat, lng);
      }
      
      if (!isUserPanned) recenterView(false); 
    }

    // --- 5. MESSAGE LISTENERS ---
    window.addEventListener("message", async (event) => {
      const data = event.data;
      if (!data || !isMapInit) return;

      if (data.action === "initParentMap") {
        const myMarkers = data.myMarkers || [];
        const groups = groupStudents(myMarkers);
        renderStudentMarkers(groups);
        recenterView(true); 
      }

      if (data.action === "updateBusLocation") {
        updateBusUI(data);
      }
    });
  </script>

  <script 
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCYaJ4Gjq36mq8swYgjNXOYr5mKZi45niA&libraries=marker,geometry&v=weekly&loading=async&callback=initMap" 
    async defer>
  </script>
</body>
</html>
